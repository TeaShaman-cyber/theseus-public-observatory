name: Collect public observatory data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect public status data
        run: npm run collect

      - name: Validate public data
        run: npm test

      - name: Commit public snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          if git diff --cached --quiet; then
            echo "No public snapshot changes to commit."
          else
            git commit -m "Collect public observatory data"
            git push
          fi
